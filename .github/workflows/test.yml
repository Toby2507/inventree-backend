name: Test

on:
  workflow_call:
    inputs:
      services:
        required: true
        type: string

jobs:
  run-unit-tests:
    runs-on: ubuntu-24.04
    if: ${{ inputs.services != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(inputs.services) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - name: Unit tests for ${{ matrix.service }}
        run: pnpm test:unit:project ${{ matrix.service }}
  
  run-integration-tests:
    runs-on: ubuntu-24.04
    if: ${{ inputs.services != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(inputs.services) }}
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_USER: inventree
          POSTGRES_DB: inventree
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inventree -d inventree"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
      ANALYTICS_DB_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
      JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET }}
      JWT_UTIL_SECRET: ${{ secrets.CI_JWT_UTIL_SECRET }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - name: Load CI environment
        run: grep -v -E '^[[:space:]]*(#|$)' .github/env/ci.env >> $GITHUB_ENV
      - name: Run migrations
        run: pnpm migrate:ci
      - name: Integration tests for ${{ matrix.service }}
        run: pnpm test:integration:project ${{ matrix.service }}
  
  run-e2e-tests:
    runs-on: ubuntu-24.04
    if: ${{ inputs.services != '[]' }}
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_USER: inventree
          POSTGRES_DB: inventree
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inventree -d inventree"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
      ANALYTICS_DB_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
      JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET }}
      JWT_UTIL_SECRET: ${{ secrets.CI_JWT_UTIL_SECRET }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - name: Load CI environment
        run: grep -v -E '^[[:space:]]*(#|$)' .github/env/ci.env >> $GITHUB_ENV
      - name: Run migrations
        run: pnpm migrate:ci
      - name: End-to-End tests
        run: pnpm test:e2e

  all-tests-passed:
    runs-on: ubuntu-24.04
    needs: [run-unit-tests, run-integration-tests, run-e2e-tests]
    if: always()
    steps:
      - name: Check all tests passed
        run: |
          if [[ "${{ needs.run-unit-tests.result }}" == "failure" || \
                "${{ needs.run-integration-tests.result }}" == "failure" || \
                "${{ needs.run-e2e-tests.result }}" == "failure" ]]; then
            exit 1
          fi
          exit 0