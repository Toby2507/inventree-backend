name: inventree_observability

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: inventree_otel_collector
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml
    networks:
      - inventree
    ports:
      - 4317:4317
      - 4318:4318
      - 8889:8889
    depends_on:
      - prometheus
      - tempo
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: inventree_grafana
    ports:
      - 3000:3000
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - inventree
    depends_on:
      - prometheus
      - tempo
      - loki

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: inventree_cadvisor
    ports:
      - 8080:8080
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - inventree

  node-exporter:
    image: prom/node-exporter:latest
    container_name: inventree_node_exporter
    ports:
      - 9100:9100
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.systemd'
      - '--collector.processes'
    networks:
      - inventree

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: inventree_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-inventree}:${DB_PASSWORD:-localdevpassword}@${DB_HOST:-db}:${DB_PORT:-5432}/${DB_NAME:-inventree}?sslmode=disable"
    ports:
      - 9187:9187
    networks:
      - inventree

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: inventree_redis_exporter
    environment:
      REDIS_ADDR: ${REDIS_URL}
    ports:
      - 9121:9121
    networks:
      - inventree

  prometheus:
    image: prom/prometheus:latest
    container_name: inventree_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
    volumes:
      - ./observability/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml
      - prometheus_data:/prometheus
    ports:
      - 9090:9090
    networks:
      - inventree

  tempo:
    image: grafana/tempo:latest
    container_name: inventree_tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - 3200:3200
      - 4319:4317
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    networks:
      - inventree

  loki:
    image: grafana/loki:latest
    container_name: inventree_loki
    ports:
      - 3100:3100
    volumes:
      - loki_data:/loki
    networks:
      - inventree

networks:
  inventree:
    external: true

volumes:
  grafana_data:
    driver: local
    name: inventree_grafana_data
  loki_data:
    driver: local
    name: inventree_loki_data
  prometheus_data:
    driver: local
    name: inventree_prometheus_data
  tempo_data:
    driver: local
    name: inventree_tempo_data