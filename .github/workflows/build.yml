name: Build

on:
  workflow_call:
    inputs:
      services:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ inputs.services != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(inputs.services) }}
        exclude:
          - app: libs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - name: Build ${{ matrix.app }}
        run: pnpm nest build ${{ matrix.app }}