global:
  scrape_interval: 5s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889

  - job_name: cadvisor
    static_configs:
      - targets:
        - 'cadvisor:8080'

  - job_name: node
    static_configs:
      - targets:
        - node-exporter:9100

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187
        
  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121